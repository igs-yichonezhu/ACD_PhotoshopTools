# IGS ACD Art Tools - Auto Release Workflow
#
# 使用方式：
# 1. 在本機打一個 version tag:  git tag v1.0.1
# 2. Push tag 到 GitHub:         git push origin v1.0.1
# 3. GitHub Actions 會自動打包 extension/ 資料夾為 zip 並發佈到 Releases
#
# Release 命名規則：tag name 即為版本號，例如 v1.0.0

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Extract version from tag
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # 3. Update version in manifest.xml
      - name: Update manifest version
        run: |
          sed -i "s/ExtensionBundleVersion=\"[^\"]*\"/ExtensionBundleVersion=\"${{ steps.version.outputs.VERSION }}\"/" extension/CSXS/manifest.xml
          sed -i "s/Version=\"[^\"]*\"/Version=\"${{ steps.version.outputs.VERSION }}\"/" extension/CSXS/manifest.xml
          echo "Updated manifest.xml to version ${{ steps.version.outputs.VERSION }}"
          cat extension/CSXS/manifest.xml | head -5

      # 4. Package extension into zip (for auto-update)
      - name: Create release zip
        run: |
          cd extension
          zip -r ../igs-arttools-v${{ steps.version.outputs.VERSION }}.zip . \
            -x "*.DS_Store" \
            -x "__MACOSX/*"
          cd ..
          echo "Package size:"
          ls -lh igs-arttools-v${{ steps.version.outputs.VERSION }}.zip

      # 5. Build .exe installer with NSIS
      - name: Install NSIS
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis

      - name: Update installer version
        run: |
          sed -i 's/DisplayVersion" ".*"/DisplayVersion" "${{ steps.version.outputs.VERSION }}"/' installer/setup.nsi

      - name: Build installer exe
        run: |
          cd installer
          makensis setup.nsi
          cd ..
          mv installer/igs-arttools-setup.exe ./igs-arttools-setup-v${{ steps.version.outputs.VERSION }}.exe
          echo "Installer size:"
          ls -lh igs-arttools-setup-v${{ steps.version.outputs.VERSION }}.exe

      # 6. Create GitHub Release (uses RELEASE_NOTES.md if exists, otherwise default)
      - name: Prepare release notes
        id: notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            echo "Using custom release notes"
            # Escape for GitHub Actions
            NOTES=$(cat RELEASE_NOTES.md)
          else
            NOTES="暫無更新說明"
          fi
          # Write to file for gh-release
          cat > /tmp/release_body.md << 'HEREDOC'
          ## IGS ACD Art Tools v${{ steps.version.outputs.VERSION }}

          ### 首次安裝
          下載 `igs-arttools-setup-v${{ steps.version.outputs.VERSION }}.exe` 雙擊安裝即可。
          安裝時 Repository 已預填，Token 留空即可（公開模式）。

          ### 已安裝的用戶
          - **自動更新：** 開啟 Photoshop 插件面板，如有偵測到新版本會自動提示更新
          - **手動更新：** 點擊面板右上角 ↻ 按鈕檢查更新

          HEREDOC
          cat RELEASE_NOTES.md >> /tmp/release_body.md 2>/dev/null || true
          echo -e "\n---\n*此 Release 由 GitHub Actions 自動產生*" >> /tmp/release_body.md

      # 7. Copy docs for release attachment
      - name: Prepare docs
        run: |
          cp "docs/安裝說明書.md" ./安裝說明書.md 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "IGS ACD Art Tools v${{ steps.version.outputs.VERSION }}"
          body_path: /tmp/release_body.md
          files: |
            igs-arttools-v${{ steps.version.outputs.VERSION }}.zip
            igs-arttools-setup-v${{ steps.version.outputs.VERSION }}.exe
            安裝說明書.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

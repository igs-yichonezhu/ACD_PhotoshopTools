<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>快速取色</title>
    <style>
        :root {
            --bg: #2b2b2b;
            --bg-card: #3a3a3a;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent: #2d8ceb;
            --border: #505050;
        }

        body {
            font-family: "Adobe Clean", "Segoe UI", sans-serif;
            font-size: 12px;
            color: var(--text);
            background: var(--bg);
            padding: 12px;
            margin: 0;
        }

        h3 { font-size: 13px; margin: 0 0 12px 0; color: var(--accent); }

        .color-section {
            background: var(--bg-card);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .color-section-title {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .color-display {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .color-swatch {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            border: 2px solid var(--border);
        }

        .color-info {
            flex: 1;
        }

        .color-info div {
            margin-bottom: 2px;
        }

        .color-value {
            font-family: monospace;
            font-size: 13px;
            font-weight: 600;
        }

        .input-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .input-row input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 8px;
            color: var(--text);
            font-size: 12px;
            font-family: monospace;
            outline: none;
        }

        .input-row input:focus { border-color: var(--accent); }

        .btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            white-space: nowrap;
        }

        .btn:hover { opacity: 0.9; }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .btn-row {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .btn-row .btn, .btn-row .btn-secondary { flex: 1; text-align: center; }
    </style>
</head>
<body>

    <h3>快速取色</h3>

    <!-- Foreground Color -->
    <div class="color-section">
        <div class="color-section-title">前景色</div>
        <div class="color-display">
            <div class="color-swatch" id="fgSwatch" style="background:#000000;"></div>
            <div class="color-info">
                <div class="color-value" id="fgHex">#000000</div>
                <div id="fgRgb" style="color:var(--text-muted);">R:0 G:0 B:0</div>
            </div>
        </div>
        <div class="input-row">
            <input type="text" id="fgInput" placeholder="#FF5500" maxlength="7">
            <button class="btn" onclick="setFgColor()">套用</button>
        </div>
    </div>

    <!-- Background Color -->
    <div class="color-section">
        <div class="color-section-title">背景色</div>
        <div class="color-display">
            <div class="color-swatch" id="bgSwatch" style="background:#ffffff;"></div>
            <div class="color-info">
                <div class="color-value" id="bgHex">#FFFFFF</div>
                <div id="bgRgb" style="color:var(--text-muted);">R:255 G:255 B:255</div>
            </div>
        </div>
        <div class="input-row">
            <input type="text" id="bgInput" placeholder="#0055FF" maxlength="7">
            <button class="btn" onclick="setBgColor()">套用</button>
        </div>
    </div>

    <!-- Actions -->
    <div class="btn-row">
        <button class="btn" onclick="refreshColors()">重新取色</button>
        <button class="btn-secondary" onclick="swapColors()">交換前/背景色</button>
        <button class="btn-secondary" onclick="resetColors()">重設</button>
    </div>

    <script>
        var callCounter = 0;
        var pendingCalls = {};

        function callPsApi(action, params) {
            return new Promise(function (resolve, reject) {
                var callId = 'call_' + (++callCounter);
                pendingCalls[callId] = { resolve: resolve, reject: reject };

                window.parent.postMessage({
                    type: 'ps-api',
                    action: action,
                    params: params || {},
                    callId: callId
                }, '*');

                setTimeout(function () {
                    if (pendingCalls[callId]) {
                        delete pendingCalls[callId];
                        reject('Request timeout');
                    }
                }, 10000);
            });
        }

        window.addEventListener('message', function (event) {
            var data = event.data;
            if (!data || data.type !== 'ps-api-response') return;
            var pending = pendingCalls[data.callId];
            if (!pending) return;
            delete pendingCalls[data.callId];
            if (data.error) pending.reject(data.error);
            else pending.resolve(data.result);
        });

        // ========================================

        function parseResult(result) {
            var data = typeof result === 'string' ? JSON.parse(result) : result;
            if (data.error) throw new Error(data.error);
            return data.data;
        }

        function hexToRgb(hex) {
            hex = hex.replace('#', '');
            return {
                r: parseInt(hex.substring(0, 2), 16),
                g: parseInt(hex.substring(2, 4), 16),
                b: parseInt(hex.substring(4, 6), 16)
            };
        }

        function refreshColors() {
            callPsApi('getForegroundColor').then(function (result) {
                var c = parseResult(result);
                document.getElementById('fgSwatch').style.background = c.hex;
                document.getElementById('fgHex').textContent = c.hex.toUpperCase();
                document.getElementById('fgRgb').textContent = 'R:' + c.r + ' G:' + c.g + ' B:' + c.b;
            }).catch(function () {});

            callPsApi('getBackgroundColor').then(function (result) {
                var c = parseResult(result);
                document.getElementById('bgSwatch').style.background = c.hex;
                document.getElementById('bgHex').textContent = c.hex.toUpperCase();
                document.getElementById('bgRgb').textContent = 'R:' + c.r + ' G:' + c.g + ' B:' + c.b;
            }).catch(function () {});
        }

        function setFgColor() {
            var hex = document.getElementById('fgInput').value.trim();
            if (!/^#?[0-9A-Fa-f]{6}$/.test(hex)) { alert('請輸入有效的 HEX 色碼'); return; }
            var rgb = hexToRgb(hex);
            callPsApi('setForegroundColor', rgb).then(function () {
                refreshColors();
            });
        }

        function setBgColor() {
            var hex = document.getElementById('bgInput').value.trim();
            if (!/^#?[0-9A-Fa-f]{6}$/.test(hex)) { alert('請輸入有效的 HEX 色碼'); return; }
            var rgb = hexToRgb(hex);
            callPsApi('setBackgroundColor', rgb).then(function () {
                refreshColors();
            });
        }

        function swapColors() {
            callPsApi('swapColors').then(function () { refreshColors(); });
        }

        function resetColors() {
            callPsApi('resetColors').then(function () { refreshColors(); });
        }

        // Initial load
        refreshColors();
    </script>

</body>
</html>

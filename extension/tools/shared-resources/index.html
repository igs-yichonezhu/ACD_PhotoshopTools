<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>共用資源</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: #1a1a1a;
            color: #ececec;
            padding: 14px;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .resource-card {
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.22, 0.61, 0.36, 1);
            background: #2a2a2e;
            border: 1px solid #2e2e32;
        }

        .resource-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .resource-card:active {
            transform: translateY(-1px);
        }

        /* Thumbnail area */
        .resource-thumb {
            position: relative;
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            overflow: hidden;
        }

        .resource-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Category tag (top-left) */
        .resource-tag {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 9px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 10px;
            letter-spacing: 0.3px;
        }

        /* Gradient presets for thumbnails */
        .thumb-sheets   { background: linear-gradient(135deg, #0f7b46, #1db974); }
        .thumb-slides   { background: linear-gradient(135deg, #c47b1a, #f0a030); }
        .thumb-docs     { background: linear-gradient(135deg, #1a5ca0, #3a90e0); }
        .thumb-tool     { background: linear-gradient(135deg, #6a2fa0, #9b50e0); }
        .thumb-link     { background: linear-gradient(135deg, #444, #666); }

        /* Card text area */
        .resource-info {
            padding: 10px 12px 12px;
        }

        .resource-name {
            font-size: 12px;
            font-weight: 600;
            color: #ececec;
            line-height: 1.35;
            margin-bottom: 3px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .resource-desc {
            font-size: 10px;
            color: #8a8a90;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .empty {
            text-align: center;
            color: #5a5a60;
            padding: 40px 0;
            font-size: 12px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="resource-grid" id="resourceGrid">
        <div class="empty">載入中...</div>
    </div>

    <script>
        (function () {
            var fs = require('fs');
            var path = require('path');
            var exec = require('child_process').exec;

            var currentDir = (function () {
                var loc = decodeURIComponent(window.location.pathname);
                if (loc.match(/^\/[A-Za-z]:\//)) loc = loc.substring(1);
                return path.dirname(loc);
            })();

            function getThumbInfo(url, iconFile) {
                if (iconFile) {
                    var iconPath = path.join(currentDir, 'icons', iconFile);
                    if (fs.existsSync(iconPath)) {
                        return { type: 'image', src: iconPath, cssClass: '', tag: '圖片' };
                    }
                }
                if (url.indexOf('spreadsheets') !== -1) return { type: 'emoji', text: '📊', cssClass: 'thumb-sheets', tag: '試算表' };
                if (url.indexOf('presentation') !== -1) return { type: 'emoji', text: '📑', cssClass: 'thumb-slides', tag: '簡報' };
                if (url.indexOf('document') !== -1)     return { type: 'emoji', text: '📄', cssClass: 'thumb-docs', tag: '文件' };
                if (url.indexOf('192.168') !== -1)       return { type: 'emoji', text: '🤖', cssClass: 'thumb-tool', tag: '工具' };
                return { type: 'emoji', text: '🔗', cssClass: 'thumb-link', tag: '連結' };
            }

            function parseResources(mdContent) {
                var resources = [];
                var lines = mdContent.split('\n');
                var current = null;

                for (var i = 0; i < lines.length; i++) {
                    var line = lines[i].trim();
                    if (!line) continue;

                    if (line.indexOf('## ') === 0) {
                        if (current) resources.push(current);
                        current = { title: line.replace('## ', ''), url: '', description: '', icon: '' };
                    } else if (current && line.indexOf('icon:') === 0) {
                        current.icon = line.replace('icon:', '').trim();
                    } else if (current && !current.url && (line.indexOf('http://') === 0 || line.indexOf('https://') === 0)) {
                        current.url = line;
                    } else if (current && current.url) {
                        current.description = current.description ? current.description + ' ' + line : line;
                    }
                }
                if (current) resources.push(current);
                return resources;
            }

            function openUrl(url) {
                exec('start "" "' + url.replace(/"/g, '\\"') + '"');
            }

            function escapeHtml(str) {
                return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            function render() {
                var gridEl = document.getElementById('resourceGrid');

                try {
                    var mdPath = path.join(currentDir, 'resources.md');
                    var mdContent = fs.readFileSync(mdPath, 'utf8');
                    var resources = parseResources(mdContent);

                    if (resources.length === 0) {
                        gridEl.innerHTML = '<div class="empty">沒有找到資源連結</div>';
                        return;
                    }

                    gridEl.innerHTML = '';

                    resources.forEach(function (res) {
                        var card = document.createElement('div');
                        card.className = 'resource-card';
                        card.title = res.url;
                        card.onclick = function () { openUrl(res.url); };

                        var thumb = getThumbInfo(res.url, res.icon);

                        // Thumbnail area
                        var thumbDiv = document.createElement('div');
                        thumbDiv.className = 'resource-thumb ' + thumb.cssClass;

                        if (thumb.type === 'image') {
                            var img = document.createElement('img');
                            img.src = 'file:///' + thumb.src.replace(/\\/g, '/');
                            img.alt = res.title;
                            thumbDiv.appendChild(img);
                        } else {
                            thumbDiv.textContent = thumb.text;
                        }

                        // Tag
                        var tagEl = document.createElement('span');
                        tagEl.className = 'resource-tag';
                        tagEl.textContent = thumb.tag;
                        thumbDiv.appendChild(tagEl);

                        card.appendChild(thumbDiv);

                        // Info area
                        var infoDiv = document.createElement('div');
                        infoDiv.className = 'resource-info';

                        var nameEl = document.createElement('div');
                        nameEl.className = 'resource-name';
                        nameEl.textContent = res.title;
                        infoDiv.appendChild(nameEl);

                        if (res.description) {
                            var descEl = document.createElement('div');
                            descEl.className = 'resource-desc';
                            descEl.textContent = res.description;
                            infoDiv.appendChild(descEl);
                        }

                        card.appendChild(infoDiv);
                        gridEl.appendChild(card);
                    });

                } catch (e) {
                    gridEl.innerHTML = '<div class="empty">無法載入資源清單：' + escapeHtml(e.message) + '</div>';
                }
            }

            render();
        })();
    </script>
</body>
</html>
